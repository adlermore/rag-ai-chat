# ─────────────────────────────────────────────────────────────────────────
# Инфраструктура Enterprise RAG Assistant (локальная разработка).
# Целевая среда — один сервер + Docker Compose (см. CLAUDE.md, docs/02).
# Запуск:  pnpm infra:up   (== docker compose -f docker/docker-compose.yml up -d)
# Значения берутся из корневого .env (см. .env.example).
# ─────────────────────────────────────────────────────────────────────────

name: rag-ai-chat

services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    # AOF-персистентность: кэш ответов и BullMQ переживают рестарт
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    # Официальный образ Qdrant без shell/curl — проверяем TCP-порт средствами bash.
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: rag-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web-консоль
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Одноразовая задача: создаёт бакет для документов при первом старте.
  minio-setup:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: rag-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-rag-documents} &&
      echo 'MinIO bucket ready: ${S3_BUCKET:-rag-documents}'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
